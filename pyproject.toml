[tool.poetry]
name = "blockauth"
version = "0.1.0"
description = "Auth package for internal usage"
authors = ["darkprinx <rctushar07@gmail.com>"]
license = "All Rights Reserved"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
django = "5.1.4"
pyjwt = "2.9.0"
requests = "2.32.3"
djangorestframework = "3.15.2"
django-ratelimit = "^4.1.0"
drf-spectacular = "0.28.0"
web3 = "^6.20.1"
eth-account = "^0.11.0"
cryptography = "^43.0.0"
argon2-cffi = "^23.0.0"
webauthn = "^2.0.0"
uuid6 = "^2024.7.10"

[tool.poetry.group.dev.dependencies]
black = "^24.0.0"
isort = "^5.13.0"
flake8 = "^7.0.0"
autoflake = "^2.3.0"

[tool.black]
line-length = 120
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 120

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
